<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixiv 批量下载器 — 登录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5; color: #333; font-size: 14px;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    background: #28a745; color: white;
    padding: 14px 20px; font-size: 18px; font-weight: bold; letter-spacing: .5px;
  }
  .center {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: white; border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
    padding: 28px; width: 100%; max-width: 360px;
  }
  .card-title {
    font-weight: bold; font-size: 13px; color: #555;
    margin-bottom: 20px; text-transform: uppercase; letter-spacing: .4px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: bold; }
  .field input[type=text],
  .field input[type=password] {
    width: 100%; padding: 9px 11px;
    border: 1px solid #ddd; border-radius: 5px;
    font-size: 13px; transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: #28a745; }
  .remember-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 18px;
  }
  .remember-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .remember-row label { font-size: 13px; cursor: pointer; color: #555; }
  #error-msg {
    font-size: 12px; color: #dc3545;
    min-height: 18px; margin-bottom: 10px; text-align: center;
  }
  .btn {
    display: block; width: 100%; padding: 10px;
    border: none; border-radius: 5px; cursor: pointer;
    font-size: 14px; font-weight: bold; color: white; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-green { background: #28a745; }
  .invite-link-row {
    margin-top: 14px; text-align: center; font-size: 12px;
  }
  .invite-link-row a { color: #28a745; cursor: pointer; text-decoration: underline; }
  .hidden { display: none; }
</style>
</head>
<body>

<header>Pixiv 批量下载器</header>

<div class="center">
  <div class="card" id="loginCard">
    <div class="card-title">管理员登录</div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="username" placeholder="用户名" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="密码" autocomplete="current-password">
    </div>
    <div class="remember-row">
      <input type="checkbox" id="remember">
      <label for="remember">保持登录状态（30 天）</label>
    </div>
    <div id="error-msg"></div>
    <button class="btn btn-green" id="login-btn" onclick="doLogin()">登录</button>
    <div class="invite-link-row">
      <a id="useInviteCode">使用邀请码</a>
    </div>
  </div>

  <div class="card hidden" id="inviteCard">
    <div class="card-title">使用邀请码</div>
    <div class="field">
      <label>邀请码</label>
      <input type="text" id="inviteCodeInput" placeholder="邀请码" autocomplete="off">
    </div>
    <div id="invite-error"></div>
    <button class="btn btn-green" id="invite-btn" onclick="doInviteRedeem()">进入</button>
    <div class="invite-link-row">
      <a id="backToLogin">返回管理员登录</a>
    </div>
  </div>
</div>

<script>
'use strict';

function getRedirect() {
  const params = new URLSearchParams(window.location.search);
  const r = params.get('redirect');
  if (r && r.startsWith('/') && !r.startsWith('//')) return r;
  return '/pixiv-batch.html';
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

async function doLogin() {
  const username  = document.getElementById('username').value.trim();
  const password  = document.getElementById('password').value;
  const rememberMe = document.getElementById('remember').checked;

  if (!username || !password) { showError('请输入用户名和密码'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  showError('');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, rememberMe }),
      credentials: 'same-origin'
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || '登录失败');
      btn.disabled = false;
      return;
    }
    window.location.href = getRedirect();
  } catch (e) {
    showError('网络错误：' + e.message);
    btn.disabled = false;
  }
}

function showInviteError(msg) {
  document.getElementById('invite-error').textContent = msg;
}

async function doInviteRedeem() {
  const code = document.getElementById('inviteCodeInput').value.trim();
  if (!code) { showInviteError('请输入邀请码'); return; }
  const btn = document.getElementById('invite-btn');
  btn.disabled = true;
  showInviteError('');
  try {
    const res = await fetch('/api/auth/invite-redeem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
      credentials: 'same-origin',
    });
    const data = await res.json();
    if (!res.ok) {
      showInviteError(data.error || '邀请码无效');
      btn.disabled = false;
      return;
    }
    window.location.href = data.redirect || '/pixiv-gallery.html';
  } catch (e) {
    showInviteError('网络错误：' + e.message);
    btn.disabled = false;
  }
}

document.getElementById('useInviteCode').addEventListener('click', () => {
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('inviteCard').classList.remove('hidden');
  document.getElementById('inviteCodeInput').focus();
});
document.getElementById('backToLogin').addEventListener('click', () => {
  document.getElementById('inviteCard').classList.add('hidden');
  document.getElementById('loginCard').classList.remove('hidden');
});

// 若 URL 带 inviteError，直接展开邀请码面板并提示
if (new URLSearchParams(window.location.search).has('inviteError')) {
  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('inviteCard').classList.remove('hidden');
  showInviteError('邀请码无效或已失效');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('inviteCard').classList.contains('hidden')) {
      doInviteRedeem();
    } else {
      doLogin();
    }
  }
});

// 若已登录则直接跳转
(async () => {
  try {
    const res = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const data = await res.json();
    if (data.valid) window.location.href = getRedirect();
  } catch {}
})();
</script>
</body>
</html>
