<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv下载数据大屏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #6f42c1;
            --secondary-color: #6610f2;
            --success-color: #20c997;
            --info-color: #0dcaf0;
            --warning-color: #fd7e14;
            --danger-color: #dc3545;
            --dark-color: #343a40;
            --light-color: #f8f9fa;
        }

        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .dashboard-header .text-muted {
            color: #ffffff !important;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-color);
            transition: transform 0.3s, box-shadow 0.3s;
            color: #ffffff;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
        }

        .stat-card .stat-label {
            font-size: 0.9rem;
            color: #adb5bd;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: #ffffff;
        }

        .card-header {
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            padding: 1rem 1.25rem;
            border-radius: 10px 10px 0 0 !important;
            color: #ffffff;
        }

        .table {
            color: #ffffff;
            margin-bottom: 0;
            background-color: transparent;
        }

        .table th {
            border-top: none;
            font-weight: 600;
            color: #adb5bd;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table th.sortable-th {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .table th.sortable-th:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .table th.sortable-th.sort-active {
            color: #ffffff;
        }

        .sort-icon {
            display: inline-block;
            font-style: normal;
            font-size: 0.7rem;
            margin-left: 4px;
            opacity: 0.5;
            vertical-align: middle;
        }

        .sort-active .sort-icon {
            opacity: 1;
            color: var(--primary-color);
        }

        .table td {
            border-color: rgba(255, 255, 255, 0.1);
            vertical-align: middle;
            padding: 0.75rem;
            background-color: transparent;
            color: #ffffff;
        }

        .table tbody tr {
            transition: background-color 0.2s;
            background-color: transparent;
        }

        .table tbody tr:hover {
            background-color: rgba(111, 66, 193, 0.1);
        }

        .progress {
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            margin-top: 5px;
            border-radius: 4px;
        }

        .progress-bar {
            background-color: var(--primary-color);
            border-radius: 4px;
        }

        .thumbnail-container {
            width: 80px;
            height: 80px;
            overflow: hidden;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .thumbnail-container:hover {
            transform: scale(1.05);
        }

        .thumbnail {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .status-badge {
            padding: 0.35em 0.65em;
            font-size: 0.75em;
            font-weight: 600;
            border-radius: 0.25rem;
        }

        .status-active {
            background-color: rgba(32, 201, 151, 0.2);
            color: var(--success-color);
        }

        .status-completed {
            background-color: rgba(13, 202, 240, 0.2);
            color: var(--info-color);
        }

        .status-failed {
            background-color: rgba(220, 53, 69, 0.2);
            color: var(--danger-color);
        }

        .status-cancelled {
            background-color: rgba(108, 117, 125, 0.2);
            color: var(--dark-color);
        }

        .status-moved {
            background-color: rgba(111, 66, 193, 0.2);
            color: var(--primary-color);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: #ffffff;
            padding: 0.5rem 1rem;
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(111, 66, 193, 0.25);
        }

        .pagination .page-link {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .pagination .page-link:hover {
            background-color: rgba(111, 66, 193, 0.2);
            border-color: var(--primary-color);
            color: #ffffff;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .last-updated {
            font-size: 0.8rem;
            color: #adb5bd;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .modal-content {
            background-color: #2d3748;
            color: #ffffff;
            border-radius: 10px;
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px 10px 0 0;
            color: #ffffff;
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 10px 10px;
        }

        .btn-close {
            filter: invert(1);
        }

        .image-modal img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 5px;
        }

        .artwork-title {
            max-width: 200px;
            overflow: visible;
            text-overflow: unset;
            white-space: normal;
            color: #ffffff;
            word-wrap: break-word;
        }

        .time-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .download-item {
            border-left: 3px solid var(--primary-color);
            padding-left: 1rem;
            color: #ffffff;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #adb5bd;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .table-responsive {
            background-color: transparent;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        #activeDownloadsList {
            color: #ffffff;
        }

        #activeDownloadsList strong,
        #activeDownloadsList span,
        #activeDownloadsList .progress {
            color: #ffffff;
        }

        .modal-backdrop {
            z-index: 1040;
        }

        .modal {
            z-index: 1050;
        }

        .active-downloads-container {
            padding: 0.5rem;
        }

        .active-download-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .active-download-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .active-download-item:last-child {
            margin-bottom: 0;
        }

        .active-download-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .artwork-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 0.25rem;
        }

        .artwork-id {
            font-size: 0.9rem;
            color: #ffffff;
            line-height: 1.3;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .active-download-source {
            font-size: 0.75rem;
            color: #adb5bd;
            margin-top: 0.25rem;
        }

        .download-progress-container {
            margin-top: 0.5rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .progress-count {
            font-size: 0.85rem;
            color: #adb5bd;
        }

        .progress-percentage {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .active-download-progress {
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .active-download-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 3px;
            transition: width 0.5s ease;
            position: relative;
        }

        .active-download-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background-image: linear-gradient(
                    -45deg,
                    rgba(255, 255, 255, 0.2) 25%,
                    transparent 25%,
                    transparent 50%,
                    rgba(255, 255, 255, 0.2) 50%,
                    rgba(255, 255, 255, 0.2) 75%,
                    transparent 75%,
                    transparent
            );
            background-size: 10px 10px;
            animation: move 1s linear infinite;
        }

        @keyframes move {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 10px 0;
            }
        }

        .download-status {
            display: flex;
            align-items: center;
            margin-top: 0.75rem;
            font-size: 0.8rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-color);
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(111, 66, 193, 0.7);
            }
            70% {
                box-shadow: 0 0 0 5px rgba(111, 66, 193, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(111, 66, 193, 0);
            }
        }

        .status-text {
            color: #adb5bd;
        }

        #emptyActiveState {
            padding: 2rem 1rem;
        }

        #emptyActiveState i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            color: var(--primary-color);
        }

        /* 优化图片预览样式 */
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 10px;
            max-height: 500px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .thumbnail-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            aspect-ratio: 3/4;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .thumbnail-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(111, 66, 193, 0.3);
            border-color: var(--primary-color);
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .thumbnail-item:hover .thumbnail-img {
            transform: scale(1.05);
        }

        .thumbnail-index {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 0.75rem;
            padding: 4px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .thumbnail-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
        }

        .thumbnail-loading .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 8px;
        }

        .thumbnail-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #dc3545;
            padding: 10px;
        }

        .thumbnail-error i {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .thumbnail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .thumbnail-count {
            font-size: 0.9rem;
            color: #adb5bd;
        }

        .thumbnail-actions {
            display: flex;
            gap: 10px;
        }

        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<div class="dashboard-header">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h1 class="h3 mb-0">
                    <i class="fas fa-chart-line me-2"></i>Pixiv下载数据大屏
                </h1>
                <p class="mb-0 text-muted">实时监控下载状态与历史记录</p>
            </div>
            <div class="col-md-6 text-end">
                <span class="last-updated">最后更新: <span id="lastUpdatedTime">--:--:--</span></span>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- 统计信息 -->
    <div class="stats-grid mb-4">
        <div class="stat-card">
            <p class="stat-label">总下载作品</p>
            <h2 class="stat-value" id="totalArtworks">0</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">总下载图片</p>
            <h2 class="stat-value" id="totalImages">0</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">已移动作品</p>
            <h2 class="stat-value" id="totalMoved">0</h2>
        </div>
        <div class="stat-card">
            <p class="stat-label">活跃下载</p>
            <h2 class="stat-value" id="activeDownloads">0</h2>
        </div>
    </div>

    <div class="row">
        <!-- 左侧：下载历史 -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-history me-2"></i>下载历史</span>
                    <div class="d-flex">
                        <input type="text" class="search-box me-2" id="searchInput" placeholder="搜索作品ID或标题...">
                        <button class="btn btn-sm btn-primary" id="refreshHistory">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0">
                            <thead>
                            <tr>
                                <th width="15%" id="th-artworkId" class="sortable-th" onclick="sortBy('artworkId')">作品ID <i id="sort-artworkId" class="sort-icon">↕</i></th>
                                <th width="25%" id="th-title"     class="sortable-th" onclick="sortBy('title')">标题 <i id="sort-title" class="sort-icon">↕</i></th>
                                <th width="10%" id="th-count"     class="sortable-th" onclick="sortBy('count')">图片数量 <i id="sort-count" class="sort-icon">↕</i></th>
                                <th width="20%" id="th-time"      class="sortable-th sort-active" onclick="sortBy('time')">下载时间 <i id="sort-time" class="sort-icon">↓</i></th>
                                <th width="15%" id="th-moved"     class="sortable-th" onclick="sortBy('moved')">状态 <i id="sort-moved" class="sort-icon">↕</i></th>
                                <th width="15%">操作</th>
                            </tr>
                            </thead>
                            <tbody id="historyTableBody">
                            <!-- 历史记录将在这里动态生成 -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyHistoryState" class="empty-state d-none">
                        <i class="fas fa-inbox"></i>
                        <h5>暂无下载历史</h5>
                        <p class="text-muted">还没有任何作品被下载</p>
                    </div>
                </div>
                <div class="card-footer">
                    <nav>
                        <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination">
                            <!-- 分页将在这里动态生成 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>

        <!-- 右侧：下载状态和统计 -->
        <div class="col-lg-4">
            <!-- 活跃下载 -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-sync-alt me-2"></i>活跃下载</span>
                    <span class="badge bg-primary" id="activeCount">0</span>
                </div>
                <div class="card-body p-0">
                    <div id="activeDownloadsList" class="active-downloads-container">
                        <!-- 活跃下载将在这里动态生成 -->
                    </div>
                    <div id="emptyActiveState" class="empty-state d-none">
                        <i class="fas fa-check-circle"></i>
                        <h5>暂无活跃下载</h5>
                        <p class="text-muted">当前没有正在进行的下载任务</p>
                    </div>
                </div>
            </div>

            <!-- 下载统计图表 -->
            <div class="card">
                <div class="card-header"><i class="fas fa-chart-bar me-2"></i>下载统计</div>
                <div class="card-body">
                    <div class="chart-container">
                        <canvas id="downloadStatsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 作品详情模态框 -->
<div class="modal fade" id="artworkModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">作品详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="artworkModalBody">
                <!-- 作品详情将在这里动态生成 -->
            </div>
        </div>
    </div>
</div>

<!-- 图片查看模态框 -->
<div class="modal fade image-modal" id="imageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">图片预览</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modalImage" src="" alt="预览图片">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ===================== 状态 =====================
    let currentPage = 1;          // 1-indexed
    let totalPages = 1;
    let totalElements = 0;
    const PAGE_SIZE = 10;

    let searchQuery = '';
    let allArtworksCache = null;  // 全量数据缓存，用于图表和搜索

    let sortKey = 'time';
    let sortDir = 'desc';

    let downloadStatsChart = null;
    let activeDownloads = [];
    let prevActiveCount = 0;

    let updateInterval;
    let activeUpdateInterval;
    let artworkModal = null;
    let imageModal = null;

    // ===================== 工具 =====================
    function escapeHtml(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function formatDateTime(unixSeconds) {
        const d = new Date(unixSeconds * 1000);
        return {
            date: d.toLocaleDateString('zh-CN'),
            time: d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            full: d.toLocaleString('zh-CN')
        };
    }

    // ===================== 初始化 =====================
    document.addEventListener('DOMContentLoaded', () => {
        artworkModal = new bootstrap.Modal(document.getElementById('artworkModal'));
        imageModal   = new bootstrap.Modal(document.getElementById('imageModal'));

        ['artworkModal', 'imageModal'].forEach(id => {
            document.getElementById(id).addEventListener('hidden.bs.modal', () => {
                document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
                document.body.classList.remove('modal-open');
            });
        });

        initDashboard();
        updateInterval       = setInterval(updateDashboard, 5000);
        activeUpdateInterval = setInterval(updateActiveDownloads, 2000);
    });

    document.addEventListener('visibilitychange', () => {
        clearInterval(activeUpdateInterval);
        activeUpdateInterval = setInterval(updateActiveDownloads, document.hidden ? 10000 : 2000);
        if (!document.hidden) updateActiveDownloads();
    });

    window.addEventListener('beforeunload', () => {
        clearInterval(updateInterval);
        clearInterval(activeUpdateInterval);
    });

    function initDashboard() {
        loadStatistics();
        loadAllDataForChart();
        updateActiveDownloads();

        document.getElementById('searchInput').addEventListener('input', onSearch);
        document.getElementById('refreshHistory').addEventListener('click', () => {
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            sortKey = 'time';
            sortDir = 'desc';
            currentPage = 1;
            document.getElementById('pagination').style.display = '';
            loadStatistics();
            loadAllDataForChart();
        });
    }

    // ===================== 定期更新 =====================
    function updateDashboard() {
        updateLastUpdatedTime();
        loadStatistics();
    }

    function updateLastUpdatedTime() {
        document.getElementById('lastUpdatedTime').textContent =
            new Date().toLocaleTimeString('zh-CN');
    }

    // ===================== 统计 =====================
    async function loadStatistics() {
        try {
            const res = await fetch('/api/downloaded/statistics');
            if (!res.ok) return;
            const s = await res.json();
            document.getElementById('totalArtworks').textContent = s.totalArtworks ?? 0;
            document.getElementById('totalImages').textContent   = s.totalImages   ?? 0;
            document.getElementById('totalMoved').textContent    = s.totalMoved    ?? 0;
        } catch (e) { console.error('统计加载失败', e); }
    }

    // ===================== 全量数据（图表 + 表格 + 搜索） =====================
    async function loadAllDataForChart() {
        try {
            const res = await fetch('/api/downloaded/history/paged?page=0&size=9999');
            if (!res.ok) return;
            const data = await res.json();
            allArtworksCache = data.content ?? [];
            updateChart(allArtworksCache);
            renderFromCache();
        } catch (e) {
            console.error('数据加载失败', e);
            document.getElementById('historyTableBody').innerHTML =
                '<tr><td colspan="6" class="text-center text-danger">加载失败，请点击刷新重试</td></tr>';
        }
    }

    // ===================== 排序 =====================
    function getSortedCache() {
        if (!allArtworksCache) return [];
        return [...allArtworksCache].sort((a, b) => {
            let va = a[sortKey];
            let vb = b[sortKey];
            if (sortKey === 'title') {
                va = (va || '').toLowerCase();
                vb = (vb || '').toLowerCase();
                return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
            }
            if (sortKey === 'moved') {
                va = a.moved ? 1 : 0;
                vb = b.moved ? 1 : 0;
            }
            return sortDir === 'asc' ? va - vb : vb - va;
        });
    }

    function sortBy(key) {
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = (key === 'time' || key === 'artworkId') ? 'desc' : 'asc';
        }
        currentPage = 1;
        renderSortHeaders();
        renderFromCache();
    }

    function renderSortHeaders() {
        const cols = ['artworkId', 'title', 'count', 'time', 'moved'];
        cols.forEach(col => {
            const th   = document.getElementById(`th-${col}`);
            const icon = document.getElementById(`sort-${col}`);
            if (!th || !icon) return;
            if (col === sortKey) {
                th.classList.add('sort-active');
                icon.textContent = sortDir === 'asc' ? '↑' : '↓';
            } else {
                th.classList.remove('sort-active');
                icon.textContent = '↕';
            }
        });
    }

    // ===================== 从缓存渲染表格（含分页） =====================
    function renderFromCache() {
        if (!allArtworksCache) return;
        const sorted = getSortedCache();
        if (searchQuery) {
            const q = searchQuery;
            const filtered = sorted.filter(a =>
                String(a.artworkId).includes(q) ||
                (a.title && a.title.toLowerCase().includes(q))
            );
            document.getElementById('pagination').style.display = 'none';
            renderArtworkTable(filtered);
        } else {
            totalElements = sorted.length;
            totalPages    = Math.ceil(totalElements / PAGE_SIZE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            document.getElementById('pagination').style.display = '';
            renderArtworkTable(sorted.slice(start, start + PAGE_SIZE));
            renderPagination();
        }
    }

    // ===================== 搜索 =====================
    function onSearch() {
        searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!searchQuery) currentPage = 1;
        renderFromCache();
    }

    // ===================== 渲染表格 =====================
    function renderArtworkTable(artworks) {
        const tbody      = document.getElementById('historyTableBody');
        const emptyState = document.getElementById('emptyHistoryState');

        if (!artworks.length) {
            tbody.innerHTML = '';
            emptyState.classList.remove('d-none');
            if (!searchQuery) document.getElementById('pagination').innerHTML = '';
            return;
        }

        emptyState.classList.add('d-none');
        tbody.innerHTML = artworks.map(artwork => {
            const dt          = formatDateTime(artwork.time);
            const status      = artwork.moved ? '已移动' : '已下载';
            const statusClass = artwork.moved ? 'status-moved' : 'status-completed';
            const title       = escapeHtml(artwork.title || '未知标题');
            return `
            <tr>
                <td><strong>${artwork.artworkId}</strong></td>
                <td class="artwork-title" title="${title}">${title}</td>
                <td><span class="badge bg-secondary">${artwork.count}</span></td>
                <td>
                    <div>${dt.date}</div>
                    <div class="time-badge">${dt.time}</div>
                </td>
                <td><span class="status-badge ${statusClass}">${status}</span></td>
                <td>
                    <div class="action-buttons">
                        <button class="btn btn-sm btn-outline-primary"
                            onclick="viewArtworkDetails(${artwork.artworkId})" title="查看详情">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-info"
                            onclick="viewThumbnails(${artwork.artworkId})" title="查看图片">
                            <i class="fas fa-images"></i>
                        </button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    // ===================== 分页渲染 =====================
    function renderPagination() {
        const pagination = document.getElementById('pagination');
        if (totalPages <= 1) { pagination.innerHTML = ''; return; }

        const maxVisible = 5;
        let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let end   = Math.min(totalPages, start + maxVisible - 1);
        if (end - start + 1 < maxVisible) start = Math.max(1, end - maxVisible + 1);

        let html = `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">
                <i class="fas fa-chevron-left"></i></a>
        </li>`;

        for (let i = start; i <= end; i++) {
            html += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
            </li>`;
        }

        html += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">
                <i class="fas fa-chevron-right"></i></a>
        </li>`;

        pagination.innerHTML = html;
    }

    function changePage(page) {
        if (page < 1 || page > totalPages || searchQuery) return;
        currentPage = page;
        renderFromCache();
    }

    // ===================== 图表（全量数据） =====================
    function updateChart(artworks) {
        const ctx = document.getElementById('downloadStatsChart').getContext('2d');

        const monthly = {};
        artworks.forEach(a => {
            const d   = new Date(a.time * 1000);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            monthly[key] = (monthly[key] || 0) + a.count;
        });

        const labels = Object.keys(monthly).sort();
        const data   = labels.map(l => monthly[l]);

        if (downloadStatsChart) downloadStatsChart.destroy();

        downloadStatsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: '每月下载图片数',
                    data,
                    backgroundColor: 'rgba(111, 66, 193, 0.7)',
                    borderColor:     'rgba(111, 66, 193, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#adb5bd' } },
                    x: {                    grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#adb5bd' } }
                },
                plugins: { legend: { labels: { color: '#adb5bd' } } }
            }
        });
    }

    // ===================== 活跃下载 =====================
    async function updateActiveDownloads() {
        try {
            const res = await fetch('/api/download/status/active');
            if (!res.ok) return;
            const ids = await res.json();

            const details = await Promise.all(
                ids.map(id => fetch(`/api/download/status/${id}`).then(r => r.ok ? r.json() : null))
            );

            prevActiveCount = activeDownloads.length;
            activeDownloads = details.filter(d => d && !d.completed && !d.failed && !d.cancelled);

            document.getElementById('activeCount').textContent    = activeDownloads.length;
            document.getElementById('activeDownloads').textContent = activeDownloads.length;
            renderActiveDownloads();
            updateLastUpdatedTime();

            // 有下载刚完成，刷新历史和统计
            if (prevActiveCount > 0 && activeDownloads.length < prevActiveCount) {
                loadStatistics();
                currentPage = 1;
                loadAllDataForChart();
            }
        } catch (e) { console.error('活跃下载更新失败', e); }
    }

    function renderActiveDownloads() {
        const container  = document.getElementById('activeDownloadsList');
        const emptyState = document.getElementById('emptyActiveState');

        if (!activeDownloads.length) {
            container.innerHTML = '';
            emptyState.classList.remove('d-none');
            return;
        }

        emptyState.classList.add('d-none');
        container.innerHTML = activeDownloads.map(d => {
            const progress = d.progressPercentage || 0;
            return `
            <div class="active-download-item">
                <div class="active-download-header">
                    <div class="artwork-info">
                        <div class="artwork-title" title="${escapeHtml(d.title)}">${escapeHtml(d.title || '未知标题')}</div>
                        <div class="artwork-id">${d.artworkId}</div>
                        <div class="active-download-source">pixiv</div>
                    </div>
                </div>
                <div class="download-progress-container">
                    <div class="progress-info">
                        <span class="progress-count">${d.downloadedCount || 0}/${d.totalImages || 0}</span>
                        <span class="progress-percentage">${progress.toFixed(1)}%</span>
                    </div>
                    <div class="active-download-progress">
                        <div class="active-download-progress-bar" style="width:${progress}%"></div>
                    </div>
                </div>
                <div class="download-status">
                    <div class="status-indicator"></div>
                    <span class="status-text">下载中...</span>
                </div>
            </div>`;
        }).join('');
    }

    // ===================== 作品详情 =====================
    async function viewArtworkDetails(artworkId) {
        try {
            const res = await fetch(`/api/downloaded/${artworkId}`);
            if (!res.ok) throw new Error();
            const artwork = await res.json();

            const dt      = formatDateTime(artwork.time);
            const moveDt  = artwork.moveTime ? formatDateTime(artwork.moveTime).full : null;

            document.getElementById('artworkModalBody').innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <h6><i class="fas fa-info-circle me-2"></i>作品信息</h6>
                    <ul class="list-unstyled">
                        <li class="mb-2"><strong>作品ID:</strong> ${artwork.artworkId}</li>
                        <li class="mb-2"><strong>标题:</strong> ${escapeHtml(artwork.title || '未知标题')}</li>
                        <li class="mb-2"><strong>图片数量:</strong> <span class="badge bg-secondary">${artwork.count}</span></li>
                        <li class="mb-2"><strong>下载时间:</strong> ${dt.full}</li>
                        <li class="mb-2"><strong>状态:</strong>
                            <span class="status-badge ${artwork.moved ? 'status-moved' : 'status-completed'}">
                                ${artwork.moved ? '已移动' : '已下载'}
                            </span>
                        </li>
                    </ul>
                </div>
                <div class="col-md-6">
                    <h6><i class="fas fa-folder me-2"></i>存储信息</h6>
                    <ul class="list-unstyled">
                        <li class="mb-2"><strong>原始文件夹:</strong><br>
                            <code class="text-break">${escapeHtml(artwork.folder)}</code>
                        </li>
                        ${artwork.moved ? `
                        <li class="mb-2"><strong>移动后文件夹:</strong><br>
                            <code class="text-break">${escapeHtml(artwork.moveFolder)}</code>
                        </li>
                        <li class="mb-2"><strong>移动时间:</strong> ${moveDt}</li>
                        ` : ''}
                    </ul>
                </div>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-primary" onclick="viewThumbnails(${artwork.artworkId})">
                    <i class="fas fa-images me-1"></i>查看图片
                </button>
            </div>`;

            artworkModal.show();
        } catch (e) {
            console.error('加载作品详情失败', e);
            alert('加载作品详情失败');
        }
    }

    // ===================== 缩略图 =====================
    async function viewThumbnails(artworkId) {
        try {
            const res = await fetch(`/api/downloaded/${artworkId}`);
            if (!res.ok) throw new Error();
            const artwork = await res.json();

            // 每张图片用唯一 id，避免异步并发时错位
            document.getElementById('artworkModalBody').innerHTML = `
            <div class="thumbnail-header">
                <div>
                    <h6 class="mb-0">图片预览</h6>
                    <div class="thumbnail-count">共 ${artwork.count} 张图片</div>
                </div>
                <div class="thumbnail-actions">
                    <button class="btn btn-sm btn-outline-secondary" onclick="viewArtworkDetails(${artworkId})">
                        <i class="fas fa-arrow-left me-1"></i>返回详情
                    </button>
                </div>
            </div>
            <div class="thumbnail-grid">
                ${Array.from({ length: artwork.count }, (_, i) => `
                <div class="thumbnail-item" id="thumb-${artworkId}-${i}"
                     onclick="viewFullImage(${artworkId}, ${i})">
                    <div class="thumbnail-loading"><div class="spinner"></div><span>加载中</span></div>
                    <div class="thumbnail-index">${i + 1}</div>
                </div>`).join('')}
            </div>`;

            artworkModal.show();

            for (let i = 0; i < artwork.count; i++) {
                loadThumbnail(artworkId, i);
            }
        } catch (e) {
            console.error('加载缩略图失败', e);
            alert('加载缩略图失败');
        }
    }

    async function loadThumbnail(artworkId, page) {
        const item = document.getElementById(`thumb-${artworkId}-${page}`);
        if (!item) return;
        try {
            const res = await fetch(`/api/downloaded/thumbnail/${artworkId}/${page}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.success && data.image) {
                item.innerHTML = `
                <img src="data:image/${data.extension};base64,${data.image}" class="thumbnail-img" alt="缩略图">
                <div class="thumbnail-index">${page + 1}</div>`;
            } else throw new Error(data.message);
        } catch (e) {
            item.innerHTML = `<div class="thumbnail-error"><i class="fas fa-exclamation-circle"></i><span>加载失败</span></div>`;
            item.style.cursor = 'default';
            item.onclick = null;
        }
    }

    // ===================== 原图预览 =====================
    async function viewFullImage(artworkId, page) {
        try {
            const res = await fetch(`/api/downloaded/image/${artworkId}/${page}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.success && data.image) {
                document.getElementById('modalImage').src =
                    `data:image/${data.extension};base64,${data.image}`;
                imageModal.show();
            } else throw new Error(data.message);
        } catch (e) {
            console.error('加载完整图片失败', e);
            alert('加载图片失败');
        }
    }
</script>
</body>
</html>
